name = "RevRemind"
client_id = "b340aead07c943941686c78ddeed26de"
application_url = "https://revremind-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = false
dev_store_url = "revremind-preview.myshopify.com"

[access_scopes]
scopes = "read_products,read_orders,read_customers,write_customers"

[auth]
redirect_urls = [
  "https://revremind.com/auth/callback",
  "https://revremind-production.up.railway.app/auth/callback",
  "http://localhost:3000/auth/callback"
]
shopify_managed_installation = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks"
  customer_data_request_url = "/webhooks"
  shop_deletion_url = "/webhooks"

[pos]
embedded = false
